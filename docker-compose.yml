services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-req-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-req-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
